name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Node 24
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Syntax check
        run: npm run check

      - name: Test
        run: npm test
